name: CI

# Sanity-checks every push/PR: does every Python file still parse, does the
# frontend JS still parse, and do the dependencies still resolve on Windows
# (the only platform this macro actually targets -- pywebview's WebView2
# backend, the `keyboard` global-hotkey hooks, and core/window.py's ctypes
# calls are all Windows-only, so a Linux runner would give a false sense of
# coverage). No test suite exists yet -- this is a "did I break the build"
# gate, not a correctness gate.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sanity-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need real history to list every commit in this push, not just HEAD (see the Discord step below)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile-check every Python file
        shell: bash
        run: |
          set -e
          find . -name "*.py" -not -path "./.git/*" -print0 | xargs -0 python -m py_compile

      - name: Syntax-check the frontend
        shell: bash
        run: node --check ui/app.js

      - name: Post to Discord git log
        # Only for actual pushes to main, not PRs (a fork's PR run has no
        # access to repo secrets anyway) -- always() so this still posts
        # even if a step above failed, since a "did the build break" ping
        # is exactly what a git-log channel is for. Built with jq (safe
        # JSON escaping) instead of hand-built/embedded-script JSON, which
        # kept fighting YAML's own quoting rules.
        #
        # Lists EVERY commit in this push, not just HEAD -- a push that
        # bundles several local commits together used to only ever report
        # the last one, silently dropping every earlier commit from the
        # log channel with no sign anything was missing (this is exactly
        # what "git logs aren't showing anything" turned out to be: most
        # pushes during a long session weren't 1 commit each). github.
        # event.before is the all-zero SHA on a branch's very first push,
        # which has nothing to diff against -- falls back to just HEAD.
        if: always() && github.event_name == 'push'
        shell: bash
        env:
          DISCORD_GIT_LOGS_WEBHOOK: ${{ secrets.DISCORD_GIT_LOGS_WEBHOOK }}
          JOB_STATUS: ${{ job.status }}
          BEFORE_SHA: ${{ github.event.before }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          if [ -z "$DISCORD_GIT_LOGS_WEBHOOK" ]; then exit 0; fi
          EMOJI="✅"
          if [ "$JOB_STATUS" != "success" ]; then EMOJI="❌"; fi

          RANGE="$BEFORE_SHA..HEAD"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$BEFORE_SHA" 2>/dev/null; then
            RANGE="HEAD"
          fi

          # Oldest first, capped at 10 (Discord's max embeds per message) --
          # a push bundling more than that is rare enough that a link to
          # compare the full range covers it.
          COMMIT_SHAS=$(git log "$RANGE" --format='%H' --reverse | tail -10)
          if [ -z "$COMMIT_SHAS" ]; then COMMIT_SHAS=$(git rev-parse HEAD); fi

          EMBEDS="[]"
          while IFS= read -r sha; do
            [ -z "$sha" ] && continue
            MSG=$(git log -1 --format='%s' "$sha" | head -c 200)
            SHORT=$(git rev-parse --short "$sha")
            AUTHOR=$(git log -1 --format='%an' "$sha")
            DESC=$(printf '**%s**\n%s · [`%s`](%s/commit/%s)' "$MSG" "$AUTHOR" "$SHORT" "$REPO_URL" "$sha")
            EMBEDS=$(echo "$EMBEDS" | jq --arg desc "$DESC" '. + [{description: $desc, color: 5793266}]')
          done <<< "$COMMIT_SHAS"

          COUNT=$(echo "$COMMIT_SHAS" | grep -c .)
          CONTENT="$EMOJI **$COUNT commit(s) pushed to main**"
          PAYLOAD=$(jq -n --arg content "$CONTENT" --argjson embeds "$EMBEDS" '{content: $content, embeds: $embeds}')
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_GIT_LOGS_WEBHOOK" >/dev/null
