name: CI

# Sanity-checks every push/PR: runs the unit test suite, verifies that every
# Python file still parses, that the frontend JS still parses, and that
# dependencies still resolve on Windows (the only platform this macro actually
# targets -- pywebview's WebView2 backend, the `keyboard` global-hotkey hooks,
# and core/window.py's ctypes calls are all Windows-only, so a Linux runner
# would give a false sense of coverage).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sanity-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need real history to list every commit in this push, not just HEAD (see the Discord step below)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit test suite
        run: python -m pytest tests/ -v

      - name: Compile-check every Python file
        shell: bash
        run: |
          set -e
          find . -name "*.py" -not -path "./.git/*" -print0 | xargs -0 python -m py_compile

      - name: Syntax-check the frontend
        shell: bash
        run: node --check ui/app.js

      - name: Post to Discord git log
        # Only for actual pushes to main, not PRs (a fork's PR run has no
        # access to repo secrets anyway) -- always() so this still posts
        # even if a step above failed, since a "did the build break" ping
        # is exactly what a git-log channel is for.
        #
        # Lists EVERY commit in this push, not just HEAD -- a push that
        # bundles several local commits together used to only ever report
        # the last one, silently dropping every earlier commit from the
        # log channel with no sign anything was missing. See
        # .github/scripts/post_git_log.py for the actual logic -- moved out
        # of an inline bash+jq block after THAT version passed every local
        # test yet still sent Discord invalid JSON on the real runner (an
        # HTTP 400 only visible once the step was changed to stop
        # discarding curl's response), a shell-quoting bug not worth
        # continuing to chase in YAML when Python's json module can't
        # produce invalid JSON by construction.
        if: always() && github.event_name == 'push'
        shell: bash
        env:
          DISCORD_GIT_LOGS_WEBHOOK: ${{ secrets.DISCORD_GIT_LOGS_WEBHOOK }}
          JOB_STATUS: ${{ job.status }}
          BEFORE_SHA: ${{ github.event.before }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: python .github/scripts/post_git_log.py
