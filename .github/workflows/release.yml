name: Release

# Triggered by pushing a version tag (vX.Y.Z, matching VERSION at the repo
# root -- see the release checklist in README.md). Publishes a GitHub
# Release for that tag -- that's the only thing this actually needs to do:
# core/updater.py's auto-update check reads /releases/latest, and the
# update itself downloads the tag's source zip, which GitHub generates
# automatically for any tag with no workflow involved. Source is also the
# only officially supported way to run this macro (python main.py / run.bat).
#
# There USED to be a PyInstaller-packaged .exe attached here -- pulled after
# it turned out broken in practice (pywebview's WinForms backend fails to
# resolve pythonnet's Python.Runtime.Loader once frozen: "Unhandled
# exception... Failed to resolve Python.Runtime.Loader"). None of
# core/*.py's __file__-based asset/data paths are frozen-build-aware either,
# so even a working freeze would need that sorted out first. Revisit
# packaging a real installer later instead of guessing at another frozen
# build blind.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
