name: Release

# Triggered by pushing a version tag (vX.Y.Z, matching VERSION at the repo
# root -- see the release checklist in README.md). Builds the real app exe
# and a small bootstrapper exe with PyInstaller (see build_pyinstaller.py/
# build_bootstrap.py) and publishes them on a GitHub Release for that tag.
#
# PyInstaller, not Nuitka: Nuitka's C-compile step took 15-20+ minutes per
# release (see git history) for a repo this size. PyInstaller just bundles
# the interpreter + bytecode -- no compile step, builds finish in under a
# minute. Trade-off: PyInstaller's bundled bytecode is far easier to
# decompile back to readable source than Nuitka's compiled machine code --
# an accepted trade here since this is a public source repo with nothing
# proprietary to protect by making it hard to reverse.
#
# The very first packaged build of this app (also PyInstaller) crashed on
# launch ("Failed to resolve Python.Runtime.Loader") because PyInstaller's
# own pywebview hook doesn't collect webview.platforms.win32, which
# winforms.py needs unconditionally. build_pyinstaller.py fixes that with
# explicit --hidden-import flags this time instead of switching build
# tools blind a second time.
#
# core/updater.py's in-app update check downloads whichever of these two
# assets is relevant (the exe itself when running frozen, the tag's source
# zip when running from source) -- this workflow doesn't need to do
# anything updater-specific beyond just publishing them here.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need real tag history for the changelog step below, not a shallow clone

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app exe (PyInstaller)
        run: python build_pyinstaller.py

      - name: Build bootstrapper exe (PyInstaller)
        run: python build_bootstrap.py

      - name: Get changelog from the tag message
        # A curated summary, not GitHub's raw commit-list changelog --
        # written into the tag itself (`git tag -a vX.Y.Z -m "..."`) when
        # cutting a release, read back out here. Falls back to the
        # pointed-at commit's message if the tag was pushed lightweight
        # (no -a) and has no message of its own.
        id: changelog
        shell: bash
        run: |
          BODY=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          if [ -z "$BODY" ]; then
            BODY=$(git log -1 --format='%B' "${{ github.ref_name }}")
          fi
          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/Creams Macro - Anime Expeditions.exe
            dist/Creams Macro - Anime Expeditions Bootstrapper.exe

      - name: Post changelog to Discord
        shell: bash
        env:
          DISCORD_UPDATE_LOGS_WEBHOOK: ${{ secrets.DISCORD_UPDATE_LOGS_WEBHOOK }}
          BODY: ${{ steps.changelog.outputs.body }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          if [ -z "$DISCORD_UPDATE_LOGS_WEBHOOK" ]; then exit 0; fi
          # Discord embed descriptions cap at 4096 chars -- trim rather
          # than let an unusually long changelog fail the whole post.
          TRIMMED=$(printf '%s' "$BODY" | head -c 3800)
          PAYLOAD=$(jq -n \
            --arg title "Cream's Macro ${{ github.ref_name }} is out" \
            --arg desc "$TRIMMED" \
            --arg url "$RELEASE_URL" \
            '{embeds: [{title: $title, description: $desc, url: $url, color: 5793266}]}')
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_UPDATE_LOGS_WEBHOOK" >/dev/null
