name: Release

# Triggered by pushing a version tag (vX.Y.Z, matching VERSION at the repo
# root -- see the release checklist in README.md). Builds the app exe with
# PyInstaller (see build_pyinstaller.py), packages it together with the
# user-editable Assets/ folder into the ONE download zip (see the
# packaging step below for why Assets ships loose instead of bundled, and
# why the zip is the only uploaded asset), and publishes it on a GitHub
# Release for that tag.
#
# PyInstaller, not Nuitka: Nuitka's C-compile step took 15-20+ minutes per
# release (see git history) for a repo this size. PyInstaller just bundles
# the interpreter + bytecode -- no compile step, builds finish in under a
# minute. Trade-off: PyInstaller's bundled bytecode is far easier to
# decompile back to readable source than Nuitka's compiled machine code --
# an accepted trade here since this is a public source repo with nothing
# proprietary to protect by making it hard to reverse.
#
# The very first packaged build of this app (also PyInstaller) crashed on
# launch ("Failed to resolve Python.Runtime.Loader") because PyInstaller's
# own pywebview hook doesn't collect webview.platforms.win32, which
# winforms.py needs unconditionally. build_pyinstaller.py fixes that with
# explicit --hidden-import flags this time instead of switching build
# tools blind a second time.
#
# core/updater.py's in-app update check downloads the release zip when
# running frozen (exe + new Assets images both come out of it), or the
# tag's source zip when running from source -- this workflow doesn't need
# to do anything updater-specific beyond just publishing here.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need real tag history for the changelog step below, not a shallow clone

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app exe (PyInstaller)
        run: python build_pyinstaller.py

      # Assets/ is deliberately NOT bundled inside the exe (see
      # build_pyinstaller.py) -- it ships as a loose, user-editable folder so
      # anyone can open/replace/add the macro's reference images (one folder
      # per searched name, any number of variant .pngs each -- see
      # core/vision.py's template_variant_paths and the Image Manager in
      # Settings > General) without rebuilding anything.
      #
      # This ONE zip is the release's only uploaded asset, on purpose --
      # v0.3.0 also shipped the bare exe, an Assets.zip, and the
      # bootstrapper, and four downloads plus GitHub's two automatic source
      # archives made the asset list a wall where picking the wrong file
      # was easy. Everything now reads from this single zip: new installs
      # extract it, core/updater.py pulls both the new exe AND any new
      # Assets images out of it (download_release_update /
      # ensure_assets_present), and bootstrap.py installs from it (the
      # bootstrapper exe itself is no longer built/uploaded here -- build
      # it locally via build_bootstrap.py if a small shareable installer
      # is needed; already-distributed copies keep working since they
      # fetch this zip by name). Dashed zip name on purpose: GitHub
      # rewrites spaces in uploaded asset filenames to dots, so a dashed
      # name stays predictable for the constructed fallback URLs
      # updater.py/bootstrap.py build when the API call is rate-limited.
      - name: Package release zip (exe + editable Assets folder)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item "dist/Creams Macro - Anime Expeditions.exe" package/
          Copy-Item Assets package/Assets -Recurse
          Compress-Archive -Path package/* -DestinationPath "dist/Creams-Macro-Anime-Expeditions.zip"

      - name: Get changelog from the tag message
        # A curated summary, not GitHub's raw commit-list changelog --
        # written into the tag itself (`git tag -a vX.Y.Z -m "..."`) when
        # cutting a release, read back out here via the API rather than
        # local git commands -- `git tag -l --format='%(contents)'` came
        # back empty in this exact job (actions/checkout's tag-object fetch
        # is flaky depending on how the ref was resolved for a tag-push
        # trigger), silently falling back to the commit message instead
        # and shipping the wrong release body. The API has no such
        # ambiguity: it reads the tag object GitHub itself has on record.
        id: changelog
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REF_JSON=$(gh api "repos/${{ github.repository }}/git/refs/tags/${{ github.ref_name }}")
          OBJ_SHA=$(echo "$REF_JSON" | jq -r '.object.sha')
          OBJ_TYPE=$(echo "$REF_JSON" | jq -r '.object.type')
          if [ "$OBJ_TYPE" = "tag" ]; then
            BODY=$(gh api "repos/${{ github.repository }}/git/tags/$OBJ_SHA" --jq '.message')
          else
            # Lightweight tag (no -a/-m) -- object.type is "commit", not
            # "tag", so there's no separate tag message to read; fall back
            # to the commit it points at.
            BODY=$(gh api "repos/${{ github.repository }}/commits/$OBJ_SHA" --jq '.commit.message')
          fi
          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/Creams-Macro-Anime-Expeditions.zip

      # Python script, not inline bash+jq -- the jq version sent Discord
      # invalid JSON (HTTP 400, code 50109) on the real runner the first
      # time a changelog contained non-ASCII characters (v0.3.0's em
      # dashes), despite the same logic validating fine locally: the exact
      # failure mode .github/scripts/post_git_log.py already documents and
      # solved for the git-log channel. See post_release_log.py.
      - name: Post changelog to Discord
        env:
          DISCORD_UPDATE_LOGS_WEBHOOK: ${{ secrets.DISCORD_UPDATE_LOGS_WEBHOOK }}
          BODY: ${{ steps.changelog.outputs.body }}
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: python .github/scripts/post_release_log.py
